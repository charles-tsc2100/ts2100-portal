<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today Style 2100 — Apps</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    // ─── Firebase Config (todaystyle2100-portal project) ────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDRMrmxdFcx65s5fRTvCVmAwKOjl01nPPM",
      authDomain: "todaystyle2100-portal.firebaseapp.com",
      databaseURL: "https://todaystyle2100-portal-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "todaystyle2100-portal",
      storageBucket: "todaystyle2100-portal.firebasestorage.app",
      messagingSenderId: "370297803972",
      appId: "1:370297803972:web:ae2a13a6ce659f2c496591"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    const auth = getAuth(app);

    // ─── Default apps (fallback if Firebase is empty) ─────────────────────────
    const DEFAULT_APPS = [
      {
        id: "lms",
        name: "Learning Hub",
        description: "Sales training & product knowledge",
        icon: "🎓",
        color: "#6366f1",
        url: "#",          // ← update with real GitHub Pages URL after deploy
        status: "live",
        order: 1
      }
    ];

    // ─── App State ─────────────────────────────────────────────────────────────
    let currentUser = null;
    let apps = [];
    let searchTerm = "";

    // ─── DOM helpers ──────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const show = id => $( id).classList.remove("hidden");
    const hide = id => $( id).classList.add("hidden");

    // ─── Load Apps from Firebase ──────────────────────────────────────────────
    async function loadApps() {
      try {
        const snap = await get(ref(db, "portal/apps"));
        if (snap.exists()) {
          const data = snap.val();
          apps = Object.values(data).sort((a, b) => (a.order || 99) - (b.order || 99));
        } else {
          // Seed default apps into Firebase
          apps = DEFAULT_APPS;
          await set(ref(db, "portal/apps"), Object.fromEntries(DEFAULT_APPS.map(a => [a.id, a])));
        }
      } catch (e) {
        console.warn("Firebase read failed, using defaults:", e.message);
        apps = DEFAULT_APPS;
      }
      renderApps();
    }

    // ─── Render App Grid ──────────────────────────────────────────────────────
    function renderApps() {
      const grid = $("app-grid");
      const empty = $("empty-state");
      const filtered = apps.filter(a =>
        a.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        (a.description || "").toLowerCase().includes(searchTerm.toLowerCase())
      );

      if (filtered.length === 0) {
        grid.innerHTML = "";
        show("empty-state");
        return;
      }
      hide("empty-state");

      grid.innerHTML = filtered.map(a => `
        <a href="${a.url}" class="app-card ${a.status === 'soon' ? 'coming-soon' : ''}"
           ${a.status === 'soon' ? 'title="Coming soon"' : `target="_blank" rel="noopener"`}
           data-id="${a.id}">
          <div class="app-icon" style="background:${a.color}20; color:${a.color}">
            ${a.icon}
          </div>
          <div class="app-info">
            <div class="app-name">${a.name}</div>
            <div class="app-desc">${a.description || ""}</div>
          </div>
          ${a.status === 'soon' ? '<div class="badge-soon">Soon</div>' : ''}
        </a>
      `).join("");
    }

    // ─── Auth: Login ──────────────────────────────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      const email = $("email-input").value.trim();
      const pass  = $("pass-input").value;
      const btn   = $("login-btn");
      const err   = $("login-error");

      btn.textContent = "Signing in…";
      btn.disabled = true;
      err.textContent = "";

      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (error) {
        err.textContent = friendlyAuthError(error.code);
        btn.textContent = "Sign In";
        btn.disabled = false;
      }
    }

    function friendlyAuthError(code) {
      const map = {
        "auth/user-not-found": "No account found with that email.",
        "auth/wrong-password": "Incorrect password.",
        "auth/invalid-email": "Please enter a valid email address.",
        "auth/too-many-requests": "Too many attempts. Please wait and try again.",
        "auth/invalid-credential": "Invalid email or password.",
      };
      return map[code] || "Sign-in failed. Please try again.";
    }

    // ─── Auth: Sign Out ───────────────────────────────────────────────────────
    window.handleSignOut = async () => {
      await signOut(auth);
    };

    // ─── Auth State Observer ──────────────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      currentUser = user;
      if (user) {
        // Show portal
        hide("auth-screen");
        show("portal-screen");
        $("user-name").textContent = user.displayName || user.email.split("@")[0];
        $("user-email").textContent = user.email;
        $("user-avatar").textContent = (user.displayName || user.email)[0].toUpperCase();
        loadApps();
      } else {
        // Show login
        show("auth-screen");
        hide("portal-screen");
        $("login-btn").textContent = "Sign In";
        $("login-btn").disabled = false;
      }
    });

    // ─── Search ───────────────────────────────────────────────────────────────
    window.handleSearch = (e) => {
      searchTerm = e.target.value;
      renderApps();
    };

    // ─── Bind login form ──────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      $("login-form").addEventListener("submit", handleLogin);
    });

    // ─── User menu toggle ─────────────────────────────────────────────────────
    window.toggleUserMenu = () => {
      $("user-menu").classList.toggle("open");
    };
    document.addEventListener("click", e => {
      if (!e.target.closest("#user-pill")) {
        const m = $("user-menu");
        if (m) m.classList.remove("open");
      }
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f4;
      --surface:   #ffffff;
      --border:    #e7e5e4;
      --text:      #1c1917;
      --muted:     #78716c;
      --accent:    #1a2e4a;
      --accent2:   #c9a84c;
      --radius:    14px;
      --shadow:    0 2px 8px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
      --shadow-hover: 0 8px 24px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.06);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hidden { display: none !important; }

    /* ── AUTH SCREEN ──────────────────────────────────────────────────────── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #1a2e4a 0%, #0f1e32 50%, #1a2e4a 100%);
    }

    .auth-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo .logo-mark {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(26,46,74,.3);
    }

    .auth-logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .auth-logo p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color .15s;
      outline: none;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }

    .login-error {
      font-size: 13px;
      color: #dc2626;
      min-height: 18px;
      margin-bottom: 12px;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-primary:hover { background: #243f63; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── PORTAL SCREEN ────────────────────────────────────────────────────── */
    #portal-screen { min-height: 100vh; display: flex; flex-direction: column; }

    /* Topbar */
    .topbar {
      background: var(--accent);
      color: #fff;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
      flex-shrink: 0;
    }

    .topbar-brand .brand-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .topbar-brand .brand-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.2px;
      line-height: 1.1;
    }

    .topbar-brand .brand-sub {
      font-size: 10px;
      opacity: .65;
      font-weight: 400;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .topbar-search {
      flex: 1;
      max-width: 380px;
      position: relative;
      margin: 0 auto;
    }

    .topbar-search input {
      width: 100%;
      padding: 8px 14px 8px 36px;
      background: rgba(255,255,255,.12);
      border: 1.5px solid rgba(255,255,255,.18);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: background .15s, border-color .15s;
    }

    .topbar-search input::placeholder { color: rgba(255,255,255,.5); }
    .topbar-search input:focus { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.4); }

    .topbar-search .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .6;
      font-size: 14px;
      pointer-events: none;
    }

    .topbar-spacer { flex: 1; }

    /* User pill */
    #user-pill {
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
    }

    .user-pill-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px 5px 5px;
      background: rgba(255,255,255,.12);
      border-radius: 100px;
      transition: background .15s;
    }

    .user-pill-inner:hover { background: rgba(255,255,255,.2); }

    .avatar {
      width: 28px;
      height: 28px;
      background: var(--accent2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .user-pill-name {
      font-size: 13px;
      font-weight: 500;
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Dropdown */
    #user-menu {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--shadow-hover);
      min-width: 200px;
      overflow: hidden;
      z-index: 200;
    }

    #user-menu.open { display: block; }

    .menu-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .menu-header .menu-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .menu-header .menu-email { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      transition: background .1s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .menu-item:hover { background: var(--bg); }
    .menu-item.danger { color: #dc2626; }
    .menu-item .mi-icon { font-size: 16px; width: 20px; text-align: center; }

    /* Portal body */
    .portal-body {
      flex: 1;
      padding: 40px 24px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .portal-header {
      margin-bottom: 32px;
    }

    .portal-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.4px;
    }

    .portal-header p {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* App grid */
    #app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .app-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
      transition: transform .18s, box-shadow .18s;
      cursor: pointer;
      position: relative;
      text-align: center;
      border: 1.5px solid transparent;
    }

    .app-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: var(--border);
    }

    .app-card.coming-soon {
      opacity: .6;
      cursor: default;
      pointer-events: none;
    }

    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }

    .app-info { width: 100%; }

    .app-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .app-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.4;
    }

    .badge-soon {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--accent2);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 100px;
      letter-spacing: .3px;
    }

    /* Empty state */
    #empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    #empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    #empty-state p { font-size: 15px; }

    /* Footer */
    .portal-footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── RESPONSIVE ───────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .topbar { padding: 0 16px; gap: 10px; }
      .topbar-search { max-width: 100%; }
      .brand-name { display: none; }
      .user-pill-name { display: none; }
      .portal-body { padding: 24px 16px; }
      #app-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .app-card { padding: 20px 14px; }
      .app-icon { width: 52px; height: 52px; font-size: 24px; }
    }

    /* ── LOADING SKELETON ─────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, #f0ede9 25%, #e5e0db 50%, #f0ede9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 12px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <!-- ── AUTH SCREEN ──────────────────────────────────────────────────────── -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark">🏢</div>
        <h1>Today Style 2100</h1>
        <p>Sign in to access your apps</p>
      </div>

      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="email-input">Email address</label>
          <input type="email" id="email-input" placeholder="you@todaystyle2100.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="pass-input">Password</label>
          <input type="password" id="pass-input" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <div class="login-error" id="login-error"></div>
        <button class="btn-primary" id="login-btn" type="submit">Sign In</button>
      </form>

      <div class="auth-footer">Today Style 2100 · Internal Apps</div>
    </div>
  </div>

  <!-- ── PORTAL SCREEN ────────────────────────────────────────────────────── -->
  <div id="portal-screen" class="hidden">

    <!-- Topbar -->
    <header class="topbar">
      <a href="#" class="topbar-brand">
        <div class="brand-icon">🏢</div>
        <div>
          <div class="brand-name">Today Style 2100</div>
          <div class="brand-sub">Apps</div>
        </div>
      </a>

      <div class="topbar-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search apps…" oninput="handleSearch(event)" />
      </div>

      <div class="topbar-spacer"></div>

      <!-- User pill -->
      <div id="user-pill" onclick="toggleUserMenu()">
        <div class="user-pill-inner">
          <div class="avatar" id="user-avatar">?</div>
          <span class="user-pill-name" id="user-name">User</span>
        </div>

        <div id="user-menu">
          <div class="menu-header">
            <div class="menu-name" id="user-name-menu">—</div>
            <div class="menu-email" id="user-email">—</div>
          </div>
          <button class="menu-item danger" onclick="handleSignOut()">
            <span class="mi-icon">🚪</span> Sign Out
          </button>
        </div>
      </div>
    </header>

    <!-- Body -->
    <main class="portal-body">
      <div class="portal-header">
        <h2>Apps</h2>
        <p>Select an app to get started</p>
      </div>

      <div id="app-grid">
        <!-- Skeleton loading cards -->
        <div class="app-card skeleton" style="height:170px;"></div>
        <div class="app-card skeleton" style="height:170px;"></div>
        <div class="app-card skeleton" style="height:170px;"></div>
      </div>

      <div id="empty-state" class="hidden">
        <div class="empty-icon">🔍</div>
        <p>No apps match your search.</p>
      </div>
    </main>

    <footer class="portal-footer">
      © 2026 Today Style 2100 · All rights reserved
    </footer>
  </div>

</body>
</html>
